<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#08090b">
  <title>SG Digital Systems</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090b;
      --bg-soft: #0b0c0f;
      --panel: #111318;
      --panel-2: #15181e;
      --text: #f4f5f7;
      --muted: #858a94;
      --muted-2: #5f646e;
      --line: #252830;
      --line-soft: #1c1f25;
      --accent: #e22131;
      --accent-2: #a90d19;
      --accent-soft: rgba(226, 33, 49, .11);
      --success: #31c47b;
      --shadow: 0 28px 90px rgba(0, 0, 0, .42);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 78% -12%, rgba(178, 14, 28, .16), transparent 36%),
        radial-gradient(circle at 8% 108%, rgba(226, 33, 49, .07), transparent 30%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image:
        linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .018) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, #000, transparent 88%);
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(920px, calc(100% - 32px));
      padding: 48px 0;
    }

    .card {
      position: relative;
      overflow: hidden;
      min-height: 470px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(240px, .85fr);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(18, 20, 25, .98), rgba(11, 13, 17, .99));
      box-shadow: var(--shadow);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(125deg, rgba(255, 255, 255, .025), transparent 28%);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: clamp(34px, 6vw, 68px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 58px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: -.04em;
      background: var(--accent-soft);
      border: 1px solid rgba(226, 33, 49, .38);
      clip-path: polygon(25% 7%, 75% 7%, 100% 50%, 75% 93%, 25% 93%, 0 50%);
      filter: drop-shadow(0 0 18px rgba(226, 33, 49, .18));
    }

    .brand-copy strong,
    .brand-copy small { display: block; }

    .brand-copy strong {
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .brand-copy small {
      margin-top: 4px;
      color: var(--muted-2);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: .18em;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 600px;
      margin: 0;
      font-size: clamp(38px, 7vw, 70px);
      line-height: .98;
      letter-spacing: -.055em;
    }

    .lead {
      max-width: 570px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      margin-top: 34px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 11px;
      color: #cdd0d6;
      background: rgba(17, 19, 24, .72);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(49, 196, 123, .08), 0 0 14px rgba(49, 196, 123, .45);
    }

    .visual {
      position: relative;
      min-height: 100%;
      border-left: 1px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(226, 33, 49, .045), transparent 35%),
        rgba(255, 255, 255, .008);
    }

    .visual::before,
    .visual::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(226, 33, 49, .22);
      transform: rotate(30deg);
      clip-path: polygon(25% 7%, 75% 7%, 100% 50%, 75% 93%, 25% 93%, 0 50%);
    }

    .visual::before {
      width: 260px;
      height: 260px;
      right: -60px;
      top: 80px;
      background: rgba(226, 33, 49, .035);
      box-shadow: 0 0 70px rgba(226, 33, 49, .08);
    }

    .visual::after {
      width: 150px;
      height: 150px;
      left: 44px;
      bottom: 48px;
      border-color: rgba(255, 255, 255, .07);
      background: rgba(255, 255, 255, .01);
    }

    .signal {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .signal-core {
      position: relative;
      z-index: 2;
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(226, 33, 49, .38);
      background: rgba(226, 33, 49, .08);
      clip-path: polygon(25% 7%, 75% 7%, 100% 50%, 75% 93%, 25% 93%, 0 50%);
      color: #fff;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: -.05em;
      box-shadow: 0 0 65px rgba(226, 33, 49, .16);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-top: 18px;
      padding: 0 4px;
      color: #464b54;
      font-size: 9px;
      letter-spacing: .06em;
    }

    @media (max-width: 760px) {
      .page { padding: 20px 0; }
      .card { grid-template-columns: 1fr; min-height: 0; }
      .brand { margin-bottom: 44px; }
      .visual { min-height: 220px; border-left: 0; border-top: 1px solid var(--line-soft); }
      .visual::before { width: 210px; height: 210px; top: 20px; right: -45px; }
      .visual::after { width: 110px; height: 110px; left: 28px; bottom: 22px; }
      .footer { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Service status">
      <div class="content">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">SG</div>
          <div class="brand-copy">
            <strong>SG Digital Systems</strong>
            <small>INFRASTRUCTURE SERVICES</small>
          </div>
        </div>

        <p class="eyebrow">Secure infrastructure</p>
        <h1>Systems built for reliable connections.</h1>
        <p class="lead">
          Private infrastructure, network services and managed digital environments.
          This endpoint is active and operating normally.
        </p>

        <div class="status">
          <span class="status-dot" aria-hidden="true"></span>
          Service online
        </div>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="signal">
          <div class="signal-core">SG</div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>SG Digital Systems</span>
      <span>Infrastructure endpoint</span>
    </footer>
  </main>
</body>
</html>
